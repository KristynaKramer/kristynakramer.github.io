<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> {% if page.title %}
    		    {{ site.title }} | {{ page.title }} 
  			{% else %}
    			{{ site.title }}
  			{% endif %} </title>
    <link rel="stylesheet" href="{{ 'style.css' | relative_url }}">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>
    
   <!-- 1. Hidden Checkbox for Toggle Logic -->
    <input type="checkbox" id="mobile-menu-toggle">

    <!-- 2. Your Existing Desktop Navigation -->
    <nav class="desktop-nav">
    <!--<nav>-->
        <h1> <a href="{{ site.baseurl }}/index.html">Kristýna Kramer</a></h1>
        <ul>
            <li class="section-title"><a href="{{ site.baseurl }}/data-home.html" class="{% if page.url contains '/data-' %}active-section{% endif %}">DATA</a></li>
            
            <li class="subsection"><a href="{{ site.baseurl }}/data-home.html" class="{% if page.url contains '/data-home' %}active{% endif %}">Home</a></li>
            
            <li class="subsection"><a href="{{ site.baseurl }}/data-portfolio.html" class="{% if page.url contains '/data-portfolio' %}active{% endif %}">Portfolio</a></li>
            
            <li class="subsection"><a href="{{ site.baseurl }}/data-certificates.html" class="{% if page.url contains '/data-certificates' %}active{% endif %}">Certificates</a></li>
            
            <li class="section-title"><a href="{{ site.baseurl }}/math-home.html" class="{% if page.url contains '/math-' %}active-section{% endif %}">MATH</a></li>
            
            <li class="subsection"><a href="{{ site.baseurl }}/math-home.html" class="{% if page.url contains '/math-home' %}active{% endif %}">Home</a></li>
            
            <li class="subsection"><a href="{{ site.baseurl }}/math-research.html" class="{% if page.url contains '/math-research' %}active{% endif %}">Research</a></li>
            
            <li class="subsection"><a href="{{ site.baseurl }}/math-teaching.html" class="{% if page.url contains '/math-teaching' %}active{% endif %}">Teaching</a></li>
            
            <li class="section-title"><a href="{{ site.baseurl }}/blog-home.html" class="{% if page.url contains '/Blog/' or page.url contains '/blog-' %}active-section{% endif %}">BLOG</a></li>
            
            <li class="subsection"><a href="{{ site.baseurl }}/blog-home.html" class="{% if page.url contains '/blog-home' %}active{% endif %}">Home</a></li>
        </ul>
    </nav>

    <main>
       
        {{ content }}
    </main>

    <!-- 4. Mobile Top Bar (Visible only on narrow screens) -->
    <header class="mobile-top-bar">
        <label for="mobile-menu-toggle" class="hamburger-label">&#9776;</label>
        <span class="brand-name">Kristýna Kramer</span>
    </header>

    <!-- 5. Mobile Full Screen Menu Overlay -->
    <nav class="mobile-nav-overlay">
        <label for="mobile-menu-toggle" class="close-label">&times;</label>
        
        <ul class="mobile-nav-links">
            <li class="section-title"><a href="{{ site.baseurl }}/data-home.html" class="{% if page.url contains '/data-' %}active-section{% endif %}">DATA</a></li>
            
            <li class="subsection"><a href="{{ site.baseurl }}/data-home.html" class="{% if page.url contains '/data-home' %}active{% endif %}">Home</a></li>
            
            <li class="subsection"><a href="{{ site.baseurl }}/data-portfolio.html" class="{% if page.url contains '/data-portfolio' %}active{% endif %}">Portfolio</a></li>
            
            <li class="subsection"><a href="{{ site.baseurl }}/data-certificates.html" class="{% if page.url contains '/data-certificates' %}active{% endif %}">Certificates</a></li>
            
            <li class="section-title"><a href="{{ site.baseurl }}/math-home.html" class="{% if page.url contains '/math-' %}active-section{% endif %}">MATH</a></li>
            
            <li class="subsection"><a href="{{ site.baseurl }}/math-home.html" class="{% if page.url contains '/math-home' %}active{% endif %}">Home</a></li>
            
            <li class="subsection"><a href="{{ site.baseurl }}/math-research.html" class="{% if page.url contains '/math-research' %}active{% endif %}">Research</a></li>
            
            <li class="subsection"><a href="{{ site.baseurl }}/math-teaching.html" class="{% if page.url contains '/math-teaching' %}active{% endif %}">Teaching</a></li>
            
            <li class="section-title"><a href="{{ site.baseurl }}/blog-home.html" class="{% if page.url contains '/Blog/' or page.url contains '/blog-' %}active-section{% endif %}">BLOG</a></li>
            
            <li class="subsection"><a href="{{ site.baseurl }}/blog-home.html" class="{% if page.url contains '/blog-home' %}active{% endif %}">Home</a></li>
        </ul>
    </nav>
</body>
</html>
